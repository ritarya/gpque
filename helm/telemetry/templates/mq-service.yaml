apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mq
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-mq
  ports:
    - name: http
      port: {{ .Values.mq.port }}
      targetPort: http
