apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  # Applies to all telemetry pods.
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - {{ .Release.Name }}-mq
          - {{ .Release.Name }}-streamer
          - {{ .Release.Name }}-collector
          - {{ .Release.Name }}-gateway
          - {{ .Release.Name }}-postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}   # allow all inbound (inter-pod + NodePort traffic)
  egress:
    - {}   # allow all outbound (inter-pod + DNS + kube-proxy)
